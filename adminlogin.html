<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CICTO</title>

  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    /* Center the container */
body{
    background-image:url(bgadmin.png) ;
    background-size: cover;
    margin:0;
    font-family:'Poppins',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Login Container */
.login-container{
    position: relative;
    width:380px;
    background:#fff;
    padding:40px 35px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    text-align:center;
}

.back-icon{
    position: absolute;
    top: 20px;
    left: 20px;

    font-size: 24px;
    color: #003366;
    text-decoration: none;
    transition: 0.3s;
}

.back-icon:hover{
    color: #0d6efd;
    transform: translateX(-3px);
}

.logo{
    width: 90px;
    margin-top: 20px; /* Para may pagitan sa back icon */
    margin-bottom: 15px;
}

/* Logo */
.logo{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:15px;
}

/* Heading */
.login-container h2{
    margin-bottom:30px;
    color:#003366;
    font-size:28px;
    font-weight:600;
}

.back-icon{
    position: absolute;
    top: 20px;
    left: 20px;

    font-size: 28px;
    text-decoration: none;
    color: #003366;
    font-weight: bold;
    transition: 0.3s;
}

.back-icon:hover{
    color: #0d6efd;
    transform: translateX(-3px);
}

/* Inputs */
.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:13px 15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
    box-sizing:border-box;
}

.input-box input:focus{
    border-color:#0d6efd;
}

/* Remember */
.remember{
    display:flex;
    justify-content:flex-start;
    margin-bottom:25px;
    font-size:14px;
}

/* Login Button */
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#084dbd;
}

/* Forgot Password */
.forgot{
    margin-top:20px;
}

.forgot a{
    text-decoration:none;
    color:#0d6efd;
    font-size:14px;
}

.forgot a:hover{
    text-decoration:underline;
}
.error-input{
    border:2px solid #ff2d55 !important;
}

.error-message{
    width:80%;
    margin: -10px auto 15px;
    color:#ff2d55;
    font-size:14px;
    display:none;
}

.error-message.show{
    display:block;
}
</style>
  <body>
   <div class="login-container">

    <a href="login.html" class="back-icon">
        ←
    </a>

    <img src="LOGO.png" alt="CICTO Logo" class="logo">

    <h2>Admin Login</h2>

   <form id="loginForm">
    <div class="input-box">
        <input type="email" id="email" placeholder="Email Address" required>
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password" required>
    </div>
   
    <div class="error-message" id="loginError">
    ⚠ The email or password you entered is incorrect.
</div>

    <div class="remember">
        <label>
            <input type="checkbox">
            Remember Me
        </label>
    </div>

  <button type="submit" id="loginBtn" class="login-btn">Login</button>

    <div class="forgot">
        <a href="#">Forgot Password?</a>
    </div>
</form>
</div>
<script>

document.getElementById("loginForm").addEventListener("submit", function(event){
    event.preventDefault();

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const error = document.getElementById("loginError");

    if(email.value === "admin@gmail.com" &&
       password.value === "admin12345"){

        email.classList.remove("error-input");
        password.classList.remove("error-input");
        error.classList.remove("show");

        window.location.href = "../admin panel/admin.html";

    } else {

        email.classList.add("error-input");
        password.classList.add("error-input");
        error.classList.add("show");

    }
});

</script>
</body>
</html>
