<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CICTO Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: #347add;
  color: white;
  padding-top: 20px;
}

/* LOGO */
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
}

.logo-img {
  width: 100px;
  height: 90px;
}

.logo-main {
  font-size: 40px;
  font-weight: 600;
  color: black;
}

.logo-sub {
  font-size: 15px;
  color: black;
}

/* MENU */
.sidebar a {
  display: block;
  padding: 15px 20px;
  color: white;
  text-decoration: none;
  text-align:center
}

.sidebar a:hover {
  background: #247af3;
}

/* LOGOUT */
.logout {
  position: absolute;
  width: 100%;
  background: #347add;
  text-align: center;
}

/* MAIN CONTENT */
.main-content {
  margin-left: 250px;
  padding: 30px;
  background: #f5f5f5;
  min-height: 100vh;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="sidebar-logo">
  <img src="LOGO.png" class="logo-img">

  <div class="logo-text">
    <div class="logo-main">CICTO</div>
    <div class="logo-sub">Baliwag City</div>
  </div>
</div>

  <a href="#">Document <br>Management</br></a>
  <a href="useradmin.html">Users</a>
  <a href="#">Reports</a>
  <a href="#">Settings</a>

  <a href="#" class="logout">Log Out</a>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">
  <h1>Admin Panel</h1>
</div>

</body>
</html>
