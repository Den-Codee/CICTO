<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CICTO Dashboard</title>

<link rel="stylesheet" href="adminsettings.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="sidebar-logo">
    <img src="LOGO.png" class="logo-img">

    <div class="logo-text">
      <div class="logo-main">CICTO</div>
      <div class="logo-sub">Baliwag City</div>
    </div>
  </div>

  <a href="admin.html">Document <br>Management</a>
  <a href="useradmin.html">Users</a>
  <a href="adminreports.html">Reports</a>
  <a href="adminsettings.html">Settings</a>
  <a href="#" class="logout">Log Out</a>

</div>

<div class="main-content">
 
    <div class="page-header"> <h1>Admin Panel</h1>
    <h1>Settings</h1></div>
   
   <div class="settings-box">

    <h3>General Settings</h3>

    <div class="setting-item">
        <label>Language</label>
        <select>
            <option>English</option>
            <option>Filipino</option>
        </select>
    </div>

    <div class="setting-item">
        <label>Time Zone</label>
        <select>
            <option>(GMT+08:00) Asia/Manila</option>
            <option>(GMT+00:00) UTC</option>
            <option>(GMT-05:00) Eastern Time</option>
        </select>
    </div>

    <div class="setting-item">
        <label>Date Format</label>
        <select>
            <option>MM/DD/YYYY</option>
            <option>DD/MM/YYYY</option>
            <option>YYYY-MM-DD</option>
        </select>
    </div>
 <div class="save-container">
    <button class="save-btn">Save Changes</button>
 </div>

   </div>


<div class="account-box">

    <h4>Account Settings</h4>

    <div class="account-row">

        <div class="account-item">
            <label>Change Email</label>
            <button class="change-btn">Change Email</button>
        </div>

        <div class="account-item">
            <label>Change Username</label>
            <button class="change-btn">Change Username</button>
        </div>

    </div>
</div>

    <div class="security-box">

    <h3>Security Settings</h3>

    <div class="security-item">
        <label>Change Password</label>
        <button class="security-btn">Change Password</button>
    </div>

    <div class="security-item">
        <label>Two-Factor Authentication</label>
        <button class="security-btn">Enable</button>
    </div>

    <div class="security-item">
        <label>Session Timeout</label>
        <select>
            <option>15 Minutes</option>
            <option>30 Minutes</option>
            <option>1 Hour</option>
            <option>2 Hours</option>
        </select>
    </div>

</div>

</div>

</body>
</html>
